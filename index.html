<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INTER + AÇÃO — AULA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="experiencia">
    <div class="grain"></div>
    <div class="vinheta"></div>

    <section id="inicio" class="inicio">
      <p class="tag">Protótipo audiovisual</p>
      <h1>INTER + AÇÃO</h1>
      <p>Uma proposta para o próximo semestre de Sociologia.</p>
      <button id="iniciar">Iniciar experiência</button>
      <small>Som discreto. Melhor com fones.</small>
    </section>

    <section id="palco" class="palco oculto">
      <div id="frase" class="frase"></div>

      <div id="mundo" class="mundo oculto">
        <div class="cena cena1"><span>IA</span></div>
        <div class="cena cena2"><span>REDES SOCIAIS</span></div>
        <div class="cena cena3"><span>ENCHENTES</span></div>
      </div>

      <div id="porta" class="porta-cena oculto">
        <div class="luz"></div>
        <div class="porta esquerda"></div>
        <div class="porta direita"></div>
      </div>

      <div id="venn" class="venn oculto">
        <div class="circulo eu">
          <div>
            <h2>EU</h2>
            <p>Prepararei as aulas.</p>
            <p>Apresentarei conteúdos, autores e conceitos.</p>
          </div>
        </div>
        <div class="circulo voce">
          <div>
            <h2>VOCÊ</h2>
            <p>Prepare-se para participar das aulas.</p>
          </div>
        </div>
        <div id="aula" class="aula">AULA</div>
      </div>

      <button id="retornar" class="retornar oculto">Retornar às perguntas</button>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
